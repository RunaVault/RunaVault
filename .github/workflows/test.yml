name: CI Tests

on:
  push:
    branches: [ node-tests, main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    name: Backend Tests

    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
    - name: Install backend dependencies
      run: |
        cd backend
        npm install
    - name: Run backend tests
      run: |
        cd backend
        npm test